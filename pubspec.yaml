name: cinemind
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_auth: ^6.0.1
  firebase_core: ^4.0.0
  flutter_dotenv: ^6.0.0
  http: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7
  palette_generator: ^0.3.3+7
  flutter_animate: ^4.0.0
  flutter_spinkit: ^5.2.2
  lite_rolling_switch: ^1.0.1
  toggle_switch: ^2.3.0
  google_sign_in: ^7.1.1
  font_awesome_flutter: ^10.9.1
  flutter_local_notifications: ^19.4.1
  timezone: ^0.10.1
  app_settings: ^6.1.1
  workmanager: ^0.7.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  lottie: ^3.3.1
  confetti: ^0.8.0
  flutter_fireworks: ^1.0.8
  flame: ^1.30.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - asset/images/
    - asset/lottie/
    - asset/images/impulse/
    - .env
  fonts:
    - family: BebasNeue
      fonts:
        - asset: asset/fonts/BebasNeue-Regular.ttf
    - family: Montserrat
      fonts:
        - asset: asset/fonts/Montserrat-Regular.ttf
        - asset: asset/fonts/Montserrat-Bold.ttf
          weight: 700
flutter_icons:
  android: true
  ios: true
  image_path: "asset/images/logo_app_icon.png"
flutter_native_splash:
  color: "#000000"
  image: asset/images/logo_app_icon.png
  android: true
  ios: true
  web: true
  fullscreen: true
